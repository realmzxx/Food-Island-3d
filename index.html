<!DOCTYPE html>
<html>
<head>
    <title>Food Island 3D - Ben & Bo Edition</title>
    <style>
        body { margin: 0; background: #87CEEB; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        #game-container {
            width: 100vw; height: 100vh;
            background: #4CAF50;
            position: relative;
            transform: perspective(1000px) rotateX(5deg);
        }

        /* The Player Character */
        #player {
            width: 50px; height: 50px;
            position: absolute;
            font-size: 40px;
            display: flex; align-items: center; justify-content: center;
            z-index: 10;
            transition: transform 0.1s ease-out;
        }

        .rock {
            width: 60px; height: 60px;
            background: #8D6E63; border-bottom: 6px solid #4E342E;
            position: absolute; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        #market {
            width: 160px; height: 160px;
            background: rgba(255, 255, 255, 0.2);
            border: 5px dashed #fff;
            position: absolute; bottom: 30px; right: 30px;
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: white; text-align: center;
        }

        #ui {
            position: fixed; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px; border-radius: 15px; z-index: 100;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        button {
            background: #FF5722; border: none; padding: 12px;
            color: white; border-radius: 8px; cursor: pointer; 
            font-weight: bold; width: 100%; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0; color: #2E7D32;">🍎 Food Island</h2>
        <p>💰 Money: <b>$<span id="money">0</span></b></p>
        <p>🎒 Pack: <span id="food">0</span> / 12</p>
        <hr>
        <small>Use <b>WASD</b> or <b>ARROWS</b></small>
        <button onclick="toasterGamble()">🎰 Toaster Island Gamble</button>
    </div>

    <div id="game-container">
        <div id="player" style="top: 200px; left: 200px;">🚶</div>
        <div id="market">🧺 MARKET<br>(Drop off Food)</div>
    </div>

<script>
    const player = document.getElementById('player');
    const world = document.getElementById('game-container');
    let pX = 200; let pY = 200;
    let money = 0; let food = 0;
    let facingLeft = false;

    const rocks = [];
    const foodIcons = ["🍇", "🌽", "🥔", "🥕"];

    function createRock() {
        const rockDiv = document.createElement('div');
        rockDiv.className = 'rock';
        rockDiv.innerHTML = foodIcons[Math.floor(Math.random() * foodIcons.length)];
        let rx = Math.random() * (window.innerWidth - 120);
        let ry = Math.random() * (window.innerHeight - 120);
        rockDiv.style.left = rx + 'px';
        rockDiv.style.top = ry + 'px';
        world.appendChild(rockDiv);
        return { x: rx, y: ry, element: rockDiv, active: true };
    }

    for(let i=0; i<8; i++) { rocks.push(createRock()); }

    window.addEventListener('keydown', (e) => {
        const speed = 25;
        const key = e.key.toLowerCase();

        // Movement Logic (WASD + Arrows)
        if(key === "w" || key === "arrowup") pY -= speed;
        if(key === "s" || key === "arrowdown") pY += speed;
        
        if(key === "a" || key === "arrowleft") {
            pX -= speed;
            facingLeft = true;
        }
        if(key === "d" || key === "arrowright") {
            pX += speed;
            facingLeft = false;
        }

        // Update position and flip direction
        player.style.left = pX + 'px';
        player.style.top = pY + 'px';
        player.style.transform = facingLeft ? "scaleX(-1)" : "scaleX(1)";

        checkCollisions();
    });

    function checkCollisions() {
        // Mining
        rocks.forEach(rock => {
            if(!rock.active) return;
            let dist = Math.sqrt(Math.pow(pX - rock.x, 2) + Math.pow(pY - rock.y, 2));
            if(dist < 60 && food < 12) {
                food++;
                rock.active = false;
                rock.element.style.transform = "scale(0)";
                updateUI();
                setTimeout(() => {
                    rock.active = true;
                    rock.element.style.transform = "scale(1)";
                }, 4000);
            }
        });

        // Market
        if(pX > window.innerWidth - 180 && pY > window.innerHeight - 180) {
            if(food > 0) {
                money += (food * 25);
                food = 0;
                updateUI();
            }
        }
    }

    function toasterGamble() {
        if(money <= 0) return alert("You're broke! Mine some veggies first.");
        let bet = prompt("How much money for the Toaster?");
        let amount = parseInt(bet);
        
        if(amount > 0 && amount <= money) {
            if(Math.random() > 0.5) {
                money += amount;
                alert("♨️ DING! You're a winner!");
            } else {
                money -= amount;
                alert("🔥 BURNT! Better luck next time.");
            }
            updateUI();
        } else {
            alert("Invalid amount!");
        }
    }

    function updateUI() {
        document.getElementById('money').innerText = money;
        document.getElementById('food').innerText = food;
    }
</script>
</body>
</html>
