<!DOCTYPE html>
<html>
<head>
    <title>Food Island - Ben & Bo Edition</title>
    <style>
        body { margin: 0; background: #0077be; font-family: 'Arial', sans-serif; overflow: hidden; }
        
        #game-container {
            width: 100vw; height: 100vh;
            background: #4CAF50; /* Initial Grass Color */
            position: relative;
            transition: background 1s; /* Smooth island transition */
        }

        /* The Player */
        #player {
            width: 50px; height: 50px; position: absolute;
            font-size: 40px; display: flex; align-items: center; justify-content: center;
            z-index: 10; transition: transform 0.1s;
        }

        /* NPCs */
        .npc {
            width: 60px; height: 60px; position: absolute;
            font-size: 45px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center;
        }
        .npc-label { 
            font-size: 14px; background: rgba(0,0,0,0.7); color: white; 
            padding: 2px 8px; border-radius: 10px; margin-top: -10px;
        }

        /* Food Rocks */
        .rock {
            width: 50px; height: 50px; background: #8D6E63;
            position: absolute; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 25px;
        }

        /* Minimalist UI */
        #ui {
            position: fixed; top: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.6); color: white;
            padding: 15px 25px; border-radius: 50px; z-index: 100;
            font-size: 24px; border: 2px solid #ffd700;
        }
    </style>
</head>
<body>

    <div id="ui">💰 $<span id="money">0</span></div>

    <div id="game-container">
        <div id="player" style="top: 300px; left: 300px;">🚶</div>

        <div id="sell-guy" class="npc" style="top: 100px; right: 100px;" onclick="sellInteraction()">
            🤵<div class="npc-label">Trader (Sell)</div>
        </div>

        <div id="boat-guy" class="npc" style="bottom: 100px; left: 100px;" onclick="boatInteraction()">
            👨‍✈️<div class="npc-label">Captain (Buy Boat)</div>
        </div>
    </div>

<script>
    const player = document.getElementById('player');
    const world = document.getElementById('game-container');
    let pX = 300; let pY = 300;
    let money = 0; let food = 0;
    let islandLevel = 1;
    let boatCost = 100;

    const rocks = [];
    const foodIcons = ["🌽", "🍎", "🥔", "🍄"];

    function spawnRocks() {
        // Clear old rocks
        rocks.forEach(r => r.element.remove());
        rocks.length = 0;

        for(let i=0; i<8; i++) {
            const rockDiv = document.createElement('div');
            rockDiv.className = 'rock';
            rockDiv.innerHTML = foodIcons[Math.floor(Math.random() * foodIcons.length)];
            let rx = 200 + Math.random() * (window.innerWidth - 400);
            let ry = 200 + Math.random() * (window.innerHeight - 400);
            rockDiv.style.left = rx + 'px';
            rockDiv.style.top = ry + 'px';
            world.appendChild(rockDiv);
            rocks.push({ x: rx, y: ry, element: rockDiv, active: true });
        }
    }

    spawnRocks();

    window.addEventListener('keydown', (e) => {
        const speed = 25;
        const key = e.key.toLowerCase();
        if(key === "w" || key === "arrowup") pY -= speed;
        if(key === "s" || key === "arrowdown") pY += speed;
        if(key === "a" || key === "arrowleft") { pX -= speed; player.style.transform = "scaleX(-1)"; }
        if(key === "d" || key === "arrowright") { pX += speed; player.style.transform = "scaleX(1)"; }

        player.style.left = pX + 'px';
        player.style.top = pY + 'px';
        checkMining();
    });

    function checkMining() {
        rocks.forEach(rock => {
            if(!rock.active) return;
            let dist = Math.sqrt(Math.pow(pX - rock.x, 2) + Math.pow(pY - rock.y, 2));
            if(dist < 50) {
                food++;
                rock.active = false;
                rock.element.style.display = 'none';
                setTimeout(() => {
                    rock.active = true;
                    rock.element.style.display = 'flex';
                }, 5000);
            }
        });
    }

    // Interaction with the Trader
    function sellInteraction() {
        let dist = getDistToNPC('sell-guy');
        if(dist < 80) {
            if(food > 0) {
                let earnings = food * 20;
                money += earnings;
                food = 0;
                updateUI();
                alert("Trader: Thanks for the food! Here is $" + earnings);
            } else {
                alert("Trader: You don't have any food to sell me!");
            }
        } else {
            alert("Walk closer to the Trader to sell!");
        }
    }

    // Interaction with the Captain
    function boatInteraction() {
        let dist = getDistToNPC('boat-guy');
        if(dist < 80) {
            if(money >= boatCost) {
                let confirmTrip = confirm("Captain: Want to sail to Island " + (islandLevel + 1) + " for $" + boatCost + "?");
                if(confirmTrip) {
                    money -= boatCost;
                    islandLevel++;
                    boatCost *= 2; // Next boat is more expensive
                    nextIsland();
                }
            } else {
                alert("Captain: You need $" + boatCost + " for a boat ride!");
            }
        } else {
            alert("Walk closer to the Captain to buy a boat!");
        }
    }

    function nextIsland() {
        // Change Grass Color
        const colors = ["#4CAF50", "#8BC34A", "#CDDC39", "#FFEB3B", "#FFC107"];
        world.style.background = colors[islandLevel % colors.length];
        
        // Reset Player Position
        pX = 300; pY = 300;
        player.style.left = pX + 'px';
        player.style.top = pY + 'px';
        
        spawnRocks();
        updateUI();
        alert("You sailed to a new island!");
    }

    function getDistToNPC(id) {
        const npc = document.getElementById(id);
        const nX = parseInt(npc.style.left || window.innerWidth - 100);
        const nY = parseInt(npc.style.top || window.innerHeight - 100);
        return Math.sqrt(Math.pow(pX - nX, 2) + Math.pow(pY - nY, 2));
    }

    function updateUI() {
        document.getElementById('money').innerText = money;
    }
</script>
</body>
</html>
