<!DOCTYPE html>
<html>
<head>
    <title>Food Island 3D - Fixed Edition</title>
    <style>
        body { margin: 0; background: #4a80ff; font-family: monospace; overflow: hidden; }
        #viewport { width: 100vw; height: 100vh; perspective: 1000px; overflow: hidden; position: relative; }
        
        /* This is the container that rotates when you move the mouse */
        #scene {
            width: 100%; height: 100%;
            transform-style: preserve-3d;
            position: absolute;
        }

        #floor {
            width: 4000px; height: 4000px;
            background-color: #5d994e;
            background-image: 
                linear-gradient(rgba(0,0,0,.1) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0,0,0,.1) 2px, transparent 2px);
            background-size: 64px 64px;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotateX(90deg); /* Lays it flat */
        }

        .object {
            position: absolute;
            transform-style: preserve-3d;
            width: 80px; height: 80px;
            text-align: center;
        }

        /* HUD Elements */
        #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; z-index: 10; pointer-events: none; }
        #stats { position: fixed; top: 20px; left: 20px; color: white; font-size: 24px; text-shadow: 2px 2px #000; }
        #hotbar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); padding: 10px; border: 2px solid #fff; display: flex; gap: 20px; color: white; font-size: 20px; }
    </style>
</head>
<body>

    <div id="stats">💰 $<span id="money">0</span></div>
    <div id="crosshair">+</div>
    <div id="hotbar"><div>🍎 <span id="food">0</span></div><div>⛏️ Pickaxe</div></div>

    <div id="viewport">
        <div id="scene">
            <div id="floor">
                </div>
        </div>
    </div>

<script>
    const scene = document.getElementById('scene');
    const floor = document.getElementById('floor');
    
    // Starting Position
    let x = 0, y = 0, z = -200; 
    let rotY = 0; // Looking Left/Right
    let rotX = 0; // Looking Up/Down
    
    let money = 0, food = 0;
    const items = [];

    // Mouse Lock
    document.addEventListener('click', () => { document.body.requestPointerLock(); });

    document.addEventListener('mousemove', (e) => {
        if (document.pointerLockElement === document.body) {
            rotY -= e.movementX * 0.2;
            rotX -= e.movementY * 0.2;
            // Limit looking up and down
            rotX = Math.max(-45, Math.min(45, rotX));
            updateView();
        }
    });

    function updateView() {
        // This is the magic math that keeps the camera attached to your head
        scene.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) translate3d(${-x}px, ${-z}px, ${-y}px)`;
        
        // Keep sprites facing you
        document.querySelectorAll('.object').forEach(obj => {
            obj.style.transform = `rotateY(${-rotY}deg) rotateX(${-rotX}deg)`;
        });
    }

    function spawnItems() {
        floor.innerHTML = "";
        for(let i=0; i<20; i++) {
            const item = document.createElement('div');
            item.className = "object";
            let ix = (Math.random() - 0.5) * 3000;
            let iy = (Math.random() - 0.5) * 3000;
            item.style.left = (ix + 2000) + "px";
            item.style.top = (iy + 2000) + "px";
            item.innerHTML = "<div style='font-size: 50px'>💎</div><div style='color:white; background:black'>Ore</div>";
            floor.appendChild(item);
            items.push({x: ix, y: iy, el: item, active: true});
        }
        
        // Trader
        const trader = document.createElement('div');
        trader.className = "object";
        trader.style.left = "2200px"; trader.style.top = "1800px";
        trader.innerHTML = "<div style='font-size: 60px'>🧐</div><div style='color:white; background:black'>Trader (Click)</div>";
        trader.onclick = () => { if(food > 0) { money += food * 50; food = 0; updateUI(); alert("Sold!"); }};
        floor.appendChild(trader);
    }

    window.addEventListener('keydown', (e) => {
        const speed = 30;
        let rad = rotY * Math.PI / 180;
        
        // WASD math that actually follows your eyes
        if (e.key.toLowerCase() === 'w') {
            x -= Math.sin(rad) * speed;
            y += Math.cos(rad) * speed;
        }
        if (e.key.toLowerCase() === 's') {
            x += Math.sin(rad) * speed;
            y -= Math.cos(rad) * speed;
        }
        if (e.key.toLowerCase() === 'a') {
            x -= Math.cos(rad) * speed;
            y -= Math.sin(rad) * speed;
        }
        if (e.key.toLowerCase() === 'd') {
            x += Math.cos(rad) * speed;
            y += Math.sin(rad) * speed;
        }
        
        updateView();
        checkMining();
    });

    function checkMining() {
        items.forEach(item => {
            if(!item.active) return;
            let dist = Math.sqrt((x - item.x)**2 + (y - item.y)**2);
            if(dist < 100) {
                food++; item.active = false; item.el.style.display = "none";
                updateUI();
            }
        });
    }

    function updateUI() {
        document.getElementById('money').innerText = money;
        document.getElementById('food').innerText = food;
    }

    spawnItems();
    updateView(); // Initial position set
</script>
</body>
</html>
