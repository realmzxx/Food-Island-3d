<!DOCTYPE html>
<html>
<head>
    <title>Fixed First Person Food Island - Ben & Bo</title>
    <style>
        body { margin: 0; background: #4a80ff; font-family: 'Courier New', monospace; overflow: hidden; }
        #viewport { width: 100vw; height: 100vh; perspective: 600px; overflow: hidden; position: relative; background: #4a80ff; }
        #camera { width: 100%; height: 100%; transform-style: preserve-3d; position: absolute; }
        #world { width: 5000px; height: 5000px; background-color: #5d994e; background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 2px, transparent 2px, transparent 64px), repeating-linear-gradient(90deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 2px, transparent 2px, transparent 64px); position: absolute; top: 50%; left: 50%; transform-style: preserve-3d; transform: translate(-50%, -50%); }
        .entity { position: absolute; transform-style: preserve-3d; width: 100px; height: 150px; text-align: center; }
        .ore { font-size: 60px; line-height: 80px; }
        .npc-skin { font-size: 80px; cursor: pointer; }
        .name-tag { color: white; background: rgba(0,0,0,0.7); padding: 5px; font-size: 16px; border-radius: 5px; display: inline-block; }
        #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; pointer-events: none; z-index: 1000; }
        #ui-top { position: fixed; top: 20px; left: 20px; color: white; font-size: 30px; text-shadow: 3px 3px #000; z-index: 100; }
        #hotbar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 350px; height: 70px; background: rgba(0,0,0,0.6); border: 4px solid #333; display: flex; align-items: center; justify-content: space-around; z-index: 100; }
        .slot { width: 55px; height: 55px; background: #8b8b8b; border: 3px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 30px; color: white;}
    </style>
</head>
<body>

    <div id="ui-top">💰 $<span id="money">0</span></div>
    <div id="crosshair">+</div>
    <div id="hotbar"><div class="slot" id="slot-count">0</div><div class="slot">🍎</div><div class="slot" style="background: #444;">⛏️</div></div>

    <div id="viewport">
        <div id="camera">
            <div id="world">
                </div>
        </div>
    </div>

<script>
    const camera = document.getElementById('camera');
    const world = document.getElementById('world');
    
    let pX = 2500; let pY = 2500; 
    let angleY = 0; // Left / Right
    let angleX = -75; // Up / Down (Set to look forward at the horizon)
    
    let money = 0; let food = 0; let boatCost = 200;
    const ores = [];

    // Lock Mouse
    document.body.addEventListener('click', () => { document.body.requestPointerLock(); });
    
    document.addEventListener('mousemove', (e) => {
        if (document.pointerLockElement === document.body) {
            angleY -= e.movementX * 0.2; // Turn Left/Right
            angleX -= e.movementY * 0.2; // Look Up/Down
            
            // Put limits so you can't flip your neck upside down
            if (angleX > -20) angleX = -20;
            if (angleX < -85) angleX = -85;
            
            updateCamera();
        }
    });

    function updateCamera() {
        // Combined math to rotate the universe correctly around Steve's eyes
        camera.style.transform = `rotateX(${angleX}deg) rotateZ(${angleY}deg) translate3d(${-pX}px, ${-pY}px, -150px)`;
        
        // Make sure billboards stand up and spin to follow your eyes
        document.querySelectorAll('.entity').forEach(entity => {
            entity.style.transform = `translate(-50%, -50%) rotateZ(${-angleY}deg) rotateX(${-angleX}deg)`;
        });
    }

    function spawnWorld() {
        world.innerHTML = ""; ores.length = 0;
        // Spawn Ores
        for(let i=0; i<15; i++) {
            let x = 1500 + Math.random() * 2000; let y = 1500 + Math.random() * 2000;
            const ore = document.createElement('div'); ore.className = 'entity ore';
            ore.style.left = x + 'px'; ore.style.top = y + 'px'; ore.innerHTML = "💎";
            world.appendChild(ore); ores.push({x, y, el: ore, active: true});
        }
        // Spawn NPCs
        createNPC(2700, 2300, "🧐", "Villager (Click to Sell)", sellFood);
        createNPC(2300, 2700, "👨‍✈️", "Captain (Click for Boat)", buyBoat);
        updateCamera();
    }

    function createNPC(x, y, emoji, name, action) {
        const div = document.createElement('div'); div.className = 'entity npc';
        div.style.left = x + 'px'; div.style.top = y + 'px';
        div.innerHTML = `<div class='name-tag'>${name}</div><div class='npc-skin'>${emoji}</div>`;
        div.addEventListener('click', (e) => { e.stopPropagation(); action(); });
        world.appendChild(div);
    }

    // FIXED MOVEMENT MECHANICS
    window.addEventListener('keydown', (e) => {
        const speed = 40;
        const key = e.key.toLowerCase();
        
        // This converts your rotation angle to standard grid steps
        let rad = (angleY * Math.PI) / 180;
        let sin = Math.sin(rad);
        let cos = Math.cos(rad);

        if (key === "w" || key === "arrowup") {
            pX -= sin * speed;
            pY += cos * speed;
        }
        if (key === "s" || key === "arrowdown") {
            pX += sin * speed;
            pY -= cos * speed;
        }
        if (key === "a" || key === "arrowleft") {
            pX -= cos * speed;
            pY -= sin * speed;
        }
        if (key === "d" || key === "arrowright") {
            pX += cos * speed;
            pY += sin * speed;
        }
        
        updateCamera();
        checkMining();
    });

    function checkMining() {
        ores.forEach(ore => {
            if(!ore.active) return;
            let dist = Math.sqrt(Math.pow(pX - ore.x, 2) + Math.pow(pY - ore.y, 2));
            if(dist < 130) {
                food++; ore.active = false; ore.el.style.display = 'none';
                updateUI();
                setTimeout(() => { ore.active = true; ore.el.style.display = 'block'; updateCamera(); }, 5000);
            }
        });
    }

    function sellFood() {
        if(food > 0) { money += food * 50; food = 0; updateUI(); alert("Villager: *Hrmmm!*"); }
    }

    function buyBoat() {
        if(money >= boatCost) {
            money -= boatCost; boatCost += 150; pX = 2500; pY = 2500;
            world.style.backgroundColor = ["#5d994e", "#4e998e", "#8e994e"][Math.floor(Math.random()*3)];
            spawnWorld(); updateUI(); alert("Sailed to new chunks!");
        }
    }

    function updateUI() {
        document.getElementById('money').innerText = money;
        document.getElementById('slot-count').innerText = food;
    }
    spawnWorld();
</script>
</body>
</html>
